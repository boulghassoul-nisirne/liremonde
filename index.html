<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LireMonde - Votre Bibliothèque Numérique</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
<nav class="bg-white shadow-md sticky top-0 z-50">
         <div class="container mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-6">

    <!-- LOGO -->
    <div class="flex items-center space-x-2 cursor-pointer" onclick="switchTab('home')">
      <i class="fas fa-book-open text-blue-600 text-2xl"></i>
      <span class="text-xl font-bold text-gray-800 tracking-tight">
        LireMonde
      </span>
    </div>

    <!-- MENU -->
    <div class="flex space-x-8 text-gray-800 font-medium">
      <button onclick="switchTab('home')" id="tab-home"
        class="hover:text-blue-600 transition active-tab">
        Accueil
      </button>

      <button onclick="switchTab('list')" id="tab-list"
        class="hover:text-blue-600 transition">
        À lire
      </button>

      <button onclick="switchTab('admin')" id="tab-admin"
        class="hover:text-blue-600 transition">
        Admin
      </button>
    </div>

    <!-- SEARCH -->
    <div class="w-full md:w-auto flex justify-end">
      <div class="relative w-full md:w-80">
        <input
          type="text"
          id="globalSearch"
          oninput="handleSearch(this.value)"
          placeholder="Rechercher un livre..."
          class="w-full pl-10 pr-4 py-2 rounded-full bg-gray-100 border focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
      </div>
    </div>

  </div>
</nav>
    <main class="container mx-auto px-4 py-8">

        <!-- HOME -->
        <section id="sec-home">

            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">

                <h2 class="text-2xl font-bold text-gray-800">
                    Découvrir les livres
                </h2>

                <div
                    class="flex items-center space-x-2 overflow-x-auto pb-2"
                    id="genreFilters">
                </div>

            </div>

            <div
                id="booksGrid"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>

        </section>

        <!-- LISTE -->
        <section id="sec-list" class="hidden">

            <h2 class="text-2xl font-bold text-gray-800 mb-8">
                Ma Liste "À lire"
            </h2>

            <div
                id="wishlistGrid"
                class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>

            <div id="emptyWishlist" class="text-center py-20 hidden">
                <p class="text-gray-500 text-lg">
                    Votre liste est vide.
                </p>
            </div>

        </section>

        <!-- ADMIN -->
        <section id="sec-admin" class="hidden">

            <div class="flex justify-between items-center mb-8">

                <h2 class="text-2xl font-bold text-blue-600">
                    Gestion de la Bibliothèque
                </h2>

                <button
                    onclick="openBookModal()"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">

                    <i class="fas fa-plus mr-2"></i>
                    Ajouter un livre
                </button>

            </div>

            <div class="bg-white rounded-xl shadow overflow-x-auto">

                <table class="w-full text-left">

                    <thead class="bg-gray-100 border-b">
                        <tr>
                            <th class="p-4">ID</th>
                            <th class="p-4">Couverture</th>
                            <th class="p-4">Titre / Auteur</th>
                            <th class="p-4">Genre</th>
                            <th class="p-4">Actions</th>
                        </tr>
                    </thead>

                    <tbody id="adminTableBody"></tbody>

                </table>

            </div>

        </section>

    </main>

    <!-- MODAL DETAILS -->
    <div id="modalDetails"
        class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100] p-4">

        <div class="bg-white rounded-2xl max-w-2xl w-full overflow-hidden flex flex-col md:flex-row relative">

            <button
                onclick="closeModal('modalDetails')"
                class="absolute top-4 right-4 text-gray-500 hover:text-black text-2xl z-10">
                &times;
            </button>

            <div class="md:w-1/2 h-64 md:h-auto overflow-hidden">
                <img id="mCover" src="" class="w-full h-full object-cover">
            </div>

            <div class="md:w-1/2 p-8 flex flex-col">

                <span id="mGenre"
                    class="text-blue-600 font-semibold text-sm uppercase mb-2">
                </span>

                <h3 id="mTitre"
                    class="text-2xl font-bold mb-1 text-gray-900">
                </h3>

                <p id="mAuteur"
                    class="text-gray-600 mb-6 italic">
                </p>

                <div class="flex-grow">
                    <p id="mDesc" class="text-gray-700 leading-relaxed"></p>
                </div>

                <div id="mActionArea" class="mt-8"></div>

            </div>

        </div>

    </div>

    <!-- MODAL FORM -->
    <div id="modalForm"
        class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100] p-4">

        <div class="bg-white rounded-xl max-w-lg w-full p-8 relative">

            <button
                onclick="closeModal('modalForm')"
                class="absolute top-4 right-4 text-gray-500 hover:text-black text-2xl">
                &times;
            </button>

            <h3 id="formTitle" class="text-2xl font-bold mb-6">
                Ajouter un livre
            </h3>

            <form id="bookForm"
                onsubmit="handleFormSubmit(event)"
                class="space-y-4">

                <input type="hidden" id="bookId">

                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Titre
                    </label>

                    <input type="text" id="fTitre"
                        required
                        class="w-full p-2 border rounded mt-1">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Auteur
                    </label>

                    <input type="text" id="fAuteur"
                        required
                        class="w-full p-2 border rounded mt-1">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Genre
                    </label>

                    <select id="fGenre"
                        required
                        class="w-full p-2 border rounded mt-1">

                        <option value="Classique">Classique</option>
                        <option value="Science-fiction">Science-fiction</option>
                        <option value="Drame">Drame</option>
                        <option value="Fantasy">Fantasy</option>

                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Description
                    </label>

                    <textarea id="fDesc"
                        rows="3"
                        required
                        class="w-full p-2 border rounded mt-1">
                    </textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        Lien Image Couverture
                    </label>

                    <input type="url"
                        id="fCover"
                        required
                        class="w-full p-2 border rounded mt-1">
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="fALire" class="mr-2">

                    <label for="fALire" class="text-sm font-medium">
                        Ajouter à la liste "À lire"
                    </label>
                </div>

                <div class="flex justify-end space-x-3 pt-4">

                    <button
                        type="button"
                        onclick="closeModal('modalForm')"
                        class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">
                        Annuler
                    </button>

                    <button
                        type="submit"
                        class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                        Enregistrer
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-10 mt-12">

        <div class="container mx-auto px-4 text-center">

            <div class="flex justify-center space-x-6 mb-6 text-2xl">
                <i class="fab fa-facebook hover:text-blue-400 cursor-pointer"></i>
                <i class="fab fa-twitter hover:text-blue-300 cursor-pointer"></i>
                <i class="fab fa-instagram hover:text-pink-400 cursor-pointer"></i>
            </div>

            <p class="text-gray-400">
                © 2025 ReadSphere - LireMonde Platform
            </p>

        </div>

    </footer>

    <script src="script.js"></script>

</body>
</html>
